name: iOS Gomobile Bind
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'AppTemplate/frontend/package-lock.json'

      - name: Build Frontend
        working-directory: ./AppTemplate/frontend
        run: |
          npm install
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: 'AppTemplate/go.sum'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Run gomobile bind for iOS
        working-directory: ./AppTemplate
        run: |
          # Ensure gobind is in PATH
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile bind -target=ios -o Sweetjuice.xcframework .

      - name: Upload XCFramework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sweetjuice-XCFramework
          path: AppTemplate/Sweetjuice.xcframework
          retention-days: 7
